        .problem-item {

            align-items: center;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            margin-bottom: 0.25rem;
            transition: background 0.2s;
        }
        .problem-item:hover { background: #21262d; }
        .problem-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 0.75rem;
            cursor: pointer;
            accent-color: #238636;
        }
        .problem-item label {
            cursor: pointer;
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .problem-item.completed label { text-decoration: line-through; color: #484f58; }
        .difficulty {
            font-size: 0.75rem;
            padding: 0.15rem 0.5rem;
            border-radius: 12px;
            font-weight: 600;
        }

        .difficulty.hard { background: #3d1a1a; color: #f85149; }

            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            background: #1f2937;
            color: #7c8a99;
            margin-left: 0.5rem;
        }
        .controls {

            bottom: 2rem;
            right: 2rem;
            display: flex;

// --- LocalStorage persistence ---
const STORAGE_KEY = 'neetcode150_progress';

function loadProgress() {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : {};
}

function saveProgress(progress) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
}

function resetProgress() {
    if (confirm('Reset all progress? This cannot be undone.')) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
    }
}

// --- Rendering ---
function render() {
    const progress = loadProgress();
    const container = document.getElementById('weeks-container');
    container.innerHTML = '';

    let totalSolved = 0, easySolved = 0, mediumSolved = 0, hardSolved = 0;
    let todaySolved = 0;
    const today = new Date().toDateString();

    PLAN.forEach(week => {
        const weekEl = document.createElement('div');
        weekEl.className = 'week-section';

        let weekSolved = 0, weekTotal = 0;

        let daysHTML = '';
        week.days.forEach(day => {
            let problemsHTML = '';
            day.problems.forEach((p, idx) => {
                const id = `w${week.week}_d${day.day}_p${idx}`;
                const checked = progress[id] ? 'checked' : '';
                const completedClass = progress[id] ? 'completed' : '';
                if (progress[id]) {
                    totalSolved++;
                    weekSolved++;
                    if (p.difficulty === 'easy') easySolved++;
                    else if (p.difficulty === 'medium') mediumSolved++;
                    else hardSolved++;
                    if (progress[id].date === today) todaySolved++;
                }
                weekTotal++;
                problemsHTML += `
                    <div class="problem-item ${completedClass}" data-id="${id}">
                        <input type="checkbox" id="${id}" ${checked} onchange="toggleProblem('${id}', this.checked)">
                        <label for="${id}">
                            <span>${p.name} <span class="category-tag">${p.category}</span></span>
                            <span class="difficulty ${p.difficulty}">${p.difficulty}</span>
                        </label>
                    </div>`;
            });
            daysHTML += `
                <div class="day-group">
                    <div class="day-label">Day ${day.day} — ${day.date}</div>
                    ${problemsHTML}
                </div>`;
        });

        weekEl.innerHTML = `
            <div class="week-header" onclick="toggleWeek(this)">
                <h2><span class="collapse-icon">▼</span> Week ${week.week}: ${week.title}</h2>
                <span class="week-progress">${weekSolved}/${weekTotal}</span>
            </div>
            <div class="week-body">${daysHTML}</div>`;
        container.appendChild(weekEl);
    });

    // Update stats
    document.getElementById('progress-text').textContent = `${totalSolved} / 144`;
    document.getElementById('progress-bar').style.width = `${(totalSolved / 144) * 100}%`;
    document.getElementById('stat-easy').textContent = easySolved;
    document.getElementById('stat-medium').textContent = mediumSolved;
    document.getElementById('stat-hard').textContent = hardSolved;
    document.getElementById('stat-today').textContent = todaySolved;

    // Calculate streak
    const streak = calculateStreak(progress);
    document.getElementById('streak-info').textContent = `🔥 Streak: ${streak} days`;

    // Days elapsed
    const start = new Date('2026-07-18');
    const now = new Date();
    const elapsed = Math.max(0, Math.floor((now - start) / 86400000));
    document.getElementById('days-elapsed').textContent = `Day ${Math.min(elapsed, 48)} of 48`;
}

function toggleProblem(id, checked) {
    const progress = loadProgress();
    if (checked) {
        progress[id] = { done: true, date: new Date().toDateString() };
    } else {
        delete progress[id];
    }
    saveProgress(progress);
    render();
}

function toggleWeek(header) {
    header.parentElement.classList.toggle('collapsed');
}

function calculateStreak(progress) {
    const dates = new Set();
    Object.values(progress).forEach(v => { if (v.date) dates.add(v.date); });

    let streak = 0;
    let d = new Date();
    // Check if today has activity, if not start from yesterday
    if (!dates.has(d.toDateString())) {
        d.setDate(d.getDate() - 1);
    }
    while (dates.has(d.toDateString())) {
        streak++;
        d.setDate(d.getDate() - 1);
    }
    return streak;
}

// Initial render
render();
</script>
